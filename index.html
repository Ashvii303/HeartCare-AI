<!DOCTYPE html>
<html>
<head>
    <title>HeartCare AI Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>


<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🫀 HeartCare AI</h2>
    <a href="/profile">👤</a>
</div>

<div class="container">

    <h1>Welcome to HeartCare AI</h1>
    <p>Your smart heart monitoring & prediction system</p>

    <!-- HEALTH STATUS CARD -->
    <div class="card">
        <h2>Live Health Status</h2>
        <p>❤️ Heart Rate: <span id="hr">78</span> bpm</p>
        <p>🩸 Blood Pressure: <span id="bp">120/80</span></p>
        <p>🌡 Temperature: <span id="temp">98.6</span> °F</p>
    </div>

    <!-- BUTTONS CARD -->
    <div class="card">

        <a href="/risk">
        <button class="btn">🧠 Predict Heart Risk</button>
        </a>

        <a href="/graph">
        <button class="btn">📊 Health Analytics</button>
        </a>

        <a href="/remedies">
        <button class="btn">💊 Health Tips</button>
        </a>

        <a href="/emergency">
        <button class="btn emergency">🚨 Emergency Help</button>
        </a>

    </div>
    <a href="/logout">
<button class="btn">Logout</button>
</a>


</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>

<footer>
    <p>HeartCare AI • Smart Healthcare System</p>
</footer>

</body>
</html>
